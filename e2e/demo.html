<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FeedbackKit E2E demo</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; }
      #app { padding: 24px; }
      .tall { height: 2200px; background: linear-gradient(#fafafa, #eee); }
    </style>
  </head>
  <body>
    <!-- #app is where a naive widget might inject; the widget must instead append
         to <body> so a transform on #app can't break its fixed positioning. -->
    <div id="app">
      <h1>Host page</h1>
      <input id="host-input" autofocus placeholder="host page field" />
      <div class="tall">tall content so the page is scrollable</div>
    </div>
    <script src="/widget.js" data-project="fk_test"></script>
  </body>
</html>
