name: "Decision"
description: "An open design/product decision for the team — with recommendation, counter-position, and deadline"
title: "[Decision] "
labels: ["decision"]
body:
  - type: textarea
    id: question
    attributes:
      label: Decision question
      description: What has to be decided, and why now?
    validations:
      required: true
  - type: textarea
    id: recommendation
    attributes:
      label: Recommendation
      description: Proposed option with rationale.
    validations:
      required: true
  - type: textarea
    id: counter
    attributes:
      label: Counter-position
      description: The strongest alternative and its best argument.
    validations:
      required: true
  - type: input
    id: deadline
    attributes:
      label: Decide by
      description: Milestone or date after which not deciding becomes blocking.
    validations:
      required: true
  - type: textarea
    id: consequences
    attributes:
      label: Cost of getting it wrong
      description: What does being wrong cost? Reversible?
    validations:
      required: false
