name: "Bug Report"
description: "Etwas ist kaputt oder verhält sich falsch"
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: Was ist kaputt?
      description: Beobachtetes Verhalten, so konkret wie möglich.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Schritte zur Reproduktion
      placeholder: "1. … 2. … 3. …"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Umgebung
      description: Browser/OS, FeedbackKit-Version (/diag), Deploy-Pfad (Fork+Builds oder CLI).
    validations:
      required: false
