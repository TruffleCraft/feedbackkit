name: "Bug Report"
description: "Something is broken or behaves incorrectly"
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What is broken?
      description: Observed behavior, as concrete as possible.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: "1. … 2. … 3. …"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Browser/OS, FeedbackKit version (/diag), deploy path (fork+Builds or CLI).
    validations:
      required: false
