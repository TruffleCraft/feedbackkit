name: CI
on:
  push:
    branches: [main]
  pull_request:

# Secret-free: fork PRs get green builds. No deploy, no live keys.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm 11 requires Node >= 22.13 (uses node:sqlite)
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build:widget
      - run: git diff --exit-code -- site/src/widget-ver.ts
      - run: pnpm check:bundle
      - run: pnpm exec wrangler deploy --config site/wrangler.toml --dry-run
      - run: pnpm materialize && pnpm exec wrangler deploy --dry-run
        env:
          CLOUDFLARE_ACCOUNT_ID: 00000000000000000000000000000000
          FK_D1_ID: 00000000-0000-0000-0000-000000000000
          FK_R2_BUCKET: feedbackkit-ci

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e # builds the widget, then runs Playwright against mocked gateway (secret-free)
