# Template — the real wrangler.toml is generated by `pnpm materialize` from build
# variables and is gitignored (ADR-004). Set these before deploy:
#   CLOUDFLARE_ACCOUNT_ID, FK_D1_ID, FK_R2_BUCKET
# (as Workers Builds build variables, or in your shell for a local deploy).
name = "feedbackkit"
main = "src/worker/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "${CLOUDFLARE_ACCOUNT_ID}"

# Widget bundle + admin assets are served from ./dist by the Worker.
[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "feedbackkit"
database_id = "${FK_D1_ID}"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "${FK_R2_BUCKET}"

[triggers]
# App-level R2 retention sweep + events rollup (P1.8 / P1.9).
crons = ["0 3 * * *"]

[vars]
FK_ENV = "production"
